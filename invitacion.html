<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Se bloquea el zoom y el scroll en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cena de Cumpleaños</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* Bloqueo absoluto de scroll y ajuste de pantalla */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh; /* Usa el 100% real de la pantalla en móviles */
            overflow: hidden;
            background-color: #000;
            font-family: 'Lato', sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .font-montserrat { font-family: 'Montserrat', sans-serif; }

        /* Capas de imágenes inmersivas */
        .img-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        /* Animación de zoom lento constante */
        .zoom-anim {
            animation: slowZoom 20s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Animación automática de crossfade (fusión de imágenes) */
        .crossfade-anim {
            animation: fadeMJ 10s infinite ease-in-out;
        }

        @keyframes fadeMJ {
            0%, 40% { opacity: 0; }     /* Muestra la primera foto */
            50%, 90% { opacity: 1; }    /* Muestra a Maluma */
            100% { opacity: 0; }        /* Vuelve a la primera foto */
        }
    </style>
    <!-- Script de YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body class="relative text-white flex flex-col justify-end" id="interactive-area">

    <!-- PANTALLA DE INICIO (Para permitir el autoplay del audio) -->
    <div id="start-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/90 backdrop-blur-md text-white cursor-pointer transition-opacity duration-1000">
        <div class="animate-pulse text-center flex flex-col items-center">
            <!-- Icono de Música Elegante en lugar de emoji -->
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-4"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            <p class="font-montserrat font-bold text-xl tracking-widest uppercase mb-2">Toca para abrir</p>
            <p class="font-lato text-sm text-gray-400">Enciende el sonido</p>
        </div>
    </div>

    <!-- REPRODUCTOR -->
    <div id="player-wrapper" class="fixed" style="bottom: 10px; right: 10px; width: 1px; height: 1px; overflow: hidden;">
        <div id="player"></div>
    </div>

        <svg id="icon-unmuted" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
        <!-- Icono de Sonido Mutado (Oculto inicialmente) -->
        <svg id="icon-muted" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
    </button>

    <script>
        // --- Lógica del Reproductor de YouTube ---
        let player;
        let isPlaying = false;
        let isPlayerReady = false;
        let userInteracted = false;

        function createYouTubePlayer() {
            if (!document.getElementById('player')) return;
            if (player) return; // Already created

            player = new YT.Player('player', {
                height: '200',
                width: '200',
                videoId: 'Xk0wdDTTPA0',
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'Xk0wdDTTPA0',
                    'playsinline': 1,
                    'mute': 1,
                    'start': 33
                },
                events: {
                    'onReady': function(event) {
                        isPlayerReady = true;
                        try {
                            event.target.playVideo();
                        } catch(e) {}
                    },
                    'onStateChange': function(event) {
                        if (event.data === YT.PlayerState.PLAYING) {
                            isPlaying = true;
                        } else if (event.data === YT.PlayerState.PAUSED) {
                            isPlaying = false;
                        }
                        updateMusicIcon();
                    },
                    'onError': function(event) {
                        console.error('YouTube Player Error:', event.data);
                    }
                }
            });
        }

        function onYouTubeIframeAPIReady() {
            createYouTubePlayer();
        }

        // Fallback: if API loaded before our script ran
        if (typeof YT !== 'undefined' && YT.Player) {
            createYouTubePlayer();
        } else {
            // Extra safety: poll for API
            let attempts = 0;
            const checkApi = setInterval(function() {
                attempts++;
                if (typeof YT !== 'undefined' && YT.Player) {
                    clearInterval(checkApi);
                    createYouTubePlayer();
                }
                if (attempts > 50) clearInterval(checkApi); // Give up after 5s
            }, 100);
        }

        function setMusicIcon(muted) {
            const iconUnmuted = document.getElementById('icon-unmuted');
            const iconMuted = document.getElementById('icon-muted');
            if (!iconUnmuted || !iconMuted) return;
            if (muted) {
                iconUnmuted.classList.add('hidden');
                iconMuted.classList.remove('hidden');
            } else {
                iconMuted.classList.add('hidden');
                iconUnmuted.classList.remove('hidden');
            }
        }

        function updateMusicIcon() {
            if (!player || !isPlayerReady) return;
            try {
                const isMuted = player.isMuted ? player.isMuted() : false;
                setMusicIcon(isMuted);
            } catch(e) {}
        }

        document.addEventListener('DOMContentLoaded', () => {
            const startScreen = document.getElementById('start-screen');
            const musicBtn = document.getElementById('music-btn');

            // Iniciar al tocar la pantalla de bienvenida
            startScreen.addEventListener('click', () => {
                userInteracted = true;
                startScreen.style.opacity = '0';
                setTimeout(() => startScreen.remove(), 1000);
                musicBtn.style.opacity = '1';

                // Mostrar icono de sonido activo inmediatamente
                setMusicIcon(false);

                // Primero desmutear (requiere interacción de usuario)
                // Luego reproducir
                if (isPlayerReady && player) {
                    try {
                        player.unMute();
                        player.setVolume(100);
                        player.playVideo();
                        isPlaying = true;
                    } catch(e) {
                        console.error('Error starting playback:', e);
                    }
                }

                // Sincronizar icono con YouTube después
                setTimeout(updateMusicIcon, 500);
            });

            // Botón para mutear/desmutear
            musicBtn.addEventListener('click', () => {
                if (!isPlayerReady || !player) return;

                try {
                    if (player.isMuted && player.isMuted()) {
                        // Está muteado → activar sonido
                        player.unMute();
                        player.setVolume(100);
                        player.playVideo();
                        setMusicIcon(false);
                    } else {
                        // Está con sonido → mutear
                        player.mute();
                        setMusicIcon(true);
                    }
                } catch(e) {
                    console.error('Error toggling mute:', e);
                }
            });
        });
    </script>
